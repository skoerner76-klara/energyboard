<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Energie-Monitor Pro - Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --pv: #f1c40f; --feedin: #e67e22; --house: #2ecc71; --wp: #9b59b6; --grid: #e74c3c; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; color: #2c3e50; }
        .container { max-width: 1200px; margin: auto; }
        .upload-area { background: #fff; padding: 20px; border-radius: 12px; text-align: center; border: 2px dashed #3498db; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer; background: #eee; font-weight: bold; }
        .tab-btn.active { background: #3498db; color: white; }
        .custom-btn { background: #2c3e50; color: white; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card h3 { font-size: 0.75rem; margin: 0; color: #7f8c8d; }
        .card p { font-size: 1.1rem; font-weight: bold; margin: 5px 0 0; }
        .chart-container { background: white; padding: 20px; border-radius: 10px; height: 450px; }
        #rangeSelector { display: none; justify-content: center; gap: 10px; margin-bottom: 20px; background: #fff; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center">☀️ Energie-Monitor Pro</h1>

    <div class="upload-area">
        <input type="file" id="fileInput" multiple accept=".csv">
        <p>Bitte <b>solar.csv</b> und <b>wp.csv</b> auswählen</p>
    </div>

    <div class="tabs" id="tabBar">
        <button class="tab-btn active" onclick="setMode('All', '', this)">Gesamt</button>
        <span id="yearButtons"></span>
        <button class="tab-btn custom-btn" onclick="setMode('Custom', '', this)">📅 Zeitraum</button>
    </div>

    <div id="rangeSelector">
        Von: <select id="selStart"></select>
        Bis: <select id="selEnd"></select>
    </div>

    <div class="stats">
        <div class="card" style="border-bottom: 4px solid var(--pv)"><h3>Erzeugung</h3><p id="vPv">-</p></div>
        <div class="card" style="border-bottom: 4px solid var(--house)"><h3>Eigenbedarf</h3><p id="vSelf">-</p></div>
        <div class="card" style="border-bottom: 4px solid var(--feedin)"><h3>Einspeisung</h3><p id="vFeed">-</p></div>
        <div class="card" style="border-bottom: 4px solid var(--grid)"><h3>Netzbezug</h3><p id="vGrid">-</p></div>
        <div class="card" style="border-bottom: 4px solid var(--wp)"><h3>WP Strom</h3><p id="vWp">-</p></div>
        <div class="card" style="border-bottom: 4px solid #2c3e50"><h3>JAZ</h3><p id="vJaz">-</p></div>
    </div>

    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    let sunData = {}, wpData = {}, chart = null;
    let mode = 'All', year = '';

    // CSV Parser für Solar (Sunsaver)
    function parseSolar(csv) {
        const results = Papa.parse(csv, { header: true, skipEmptyLines: true }).data;
        const processed = {};
        results.forEach(r => {
            const time = r.Time || r.time;
            if (!time) return;
            const month = time.substring(0, 7); // Holt YYYY-MM
            if (!processed[month]) processed[month] = { pv: 0, feed: 0, grid: 0, self: 0 };

            const p2s = parseFloat(r.PvToSite) || 0;
            const p2g = parseFloat(r.PvToGrid) || 0;
            const p2b = parseFloat(r.PvToBattery) || 0;
            const b2s = parseFloat(r.BatteryToSite) || 0;
            const b2g = parseFloat(r.BatteryToGrid) || 0;
            const g2s = parseFloat(r.GridToSite) || 0;
            const g2b = parseFloat(r.GridToBattery) || 0;

            processed[month].pv += (p2s + p2g + p2b);
            processed[month].feed += (p2g + b2g); // WICHTIG: Addiert beides für Februar-Fix
            processed[month].grid += (g2s + g2b);
            processed[month].self += (p2s + b2s);
        });
        return processed;
    }

    // CSV Parser für WP
    function parseWP(csv) {
        const processed = {};
        const rows = Papa.parse(csv.trim(), { delimiter: ";", skipEmptyLines: true }).data;
        rows.forEach(r => {
            if ((r[0]||"").toString().toLowerCase() === "monat") {
                let m = r[1];
                if(m.includes(".")) { const p = m.split("."); m = `${p[2]}-${p[1].padStart(2,'0')}`; }
                const heat = parseFloat(r[7]?.replace(/\./g, '').replace(',', '.')) || 0;
                const elM = parseFloat(r[12]?.replace(/\./g, '').replace(',', '.')) || 0;
                const elR = parseFloat(r[17]?.replace(/\./g, '').replace(',', '.')) || 0;
                processed[m] = { elec: elM + elR, heat: heat + elM + elR };
            }
        });
        return processed;
    }

    function setMode(m, y, btn) {
        mode = m; year = y;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('rangeSelector').style.display = (m === 'Custom') ? 'flex' : 'none';
        render();
    }

    function updateUI() {
        const keys = Array.from(new Set([...Object.keys(sunData), ...Object.keys(wpData)])).sort();
        const years = Array.from(new Set(keys.map(k => k.split('-')[0]))).sort();
        
        const yearBox = document.getElementById('yearButtons');
        yearBox.innerHTML = '';
        years.forEach(y => {
            const b = document.createElement('button');
            b.innerText = y; b.className = 'tab-btn';
            b.onclick = () => setMode('Year', y, b);
            yearBox.appendChild(b);
        });

        const sS = document.getElementById('selStart'), sE = document.getElementById('selEnd');
        sS.innerHTML = ''; sE.innerHTML = '';
        keys.forEach(k => { sS.add(new Option(k, k)); sE.add(new Option(k, k)); });
        sE.selectedIndex = keys.length - 1;
        sS.onchange = sE.onchange = render;
        render();
    }

    function render() {
        const allKeys = Array.from(new Set([...Object.keys(sunData), ...Object.keys(wpData)])).sort();
        let keys = allKeys;
        if (mode === 'Year') keys = allKeys.filter(k => k.startsWith(year));
        if (mode === 'Custom') {
            const start = document.getElementById('selStart').value;
            const end = document.getElementById('selEnd').value;
            keys = allKeys.filter(k => k >= start && k <= end);
        }

        const stats = keys.map(k => ({
            k,
            s: sunData[k] || {pv:0, feed:0, grid:0, self:0},
            w: wpData[k] || {elec:0, heat:0}
        }));

        const t = stats.reduce((a, b) => ({
            pv: a.pv+b.s.pv, self: a.self+b.s.self, feed: a.feed+b.s.feed,
            grid: a.grid+b.s.grid, elec: a.elec+b.w.elec, heat: a.heat+b.w.heat
        }), {pv:0, self:0, feed:0, grid:0, elec:0, heat:0});

        document.getElementById('vPv').innerText = t.pv.toFixed(0) + " kWh";
        document.getElementById('vSelf').innerText = t.self.toFixed(0) + " kWh";
        document.getElementById('vFeed').innerText = t.feed.toFixed(0) + " kWh";
        document.getElementById('vGrid').innerText = t.grid.toFixed(0) + " kWh";
        document.getElementById('vWp').innerText = t.elec.toFixed(0) + " kWh";
        document.getElementById('vJaz').innerText = t.elec > 0 ? (t.heat/t.elec).toFixed(2) : "-";

        if (chart) chart.destroy();
        chart = new Chart(document.getElementById('mainChart'), {
            type: 'bar',
            data: {
                labels: keys,
                datasets: [
                    { label: 'PV Erzeugung', data: stats.map(d => d.s.pv), backgroundColor: '#f1c40f' },
                    { label: 'Eigenverbrauch', data: stats.map(d => d.s.self), backgroundColor: '#2ecc71' },
                    { label: 'Netzbezug', data: stats.map(d => d.s.grid), backgroundColor: '#e74c3c' },
                    { label: 'Wärmepumpe', data: stats.map(d => d.w.elec), backgroundColor: '#9b59b6' },
                    { label: 'Einspeisung', data: stats.map(d => d.s.feed), backgroundColor: '#e67e22' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    document.getElementById('fileInput').onchange = e => {
        const files = Array.from(e.target.files);
        let count = 0;
        files.forEach(f => {
            const reader = new FileReader();
            reader.onload = ev => {
                const text = ev.target.result;
                if (text.includes("PvToSite")) sunData = parseSolar(text);
                else wpData = parseWP(text);
                if (++count === files.length) updateUI();
            };
            reader.readAsText(f);
        });
    };
</script>
</body>
</html>
