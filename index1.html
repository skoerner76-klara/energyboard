<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Energie-Monitor - Recovery Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --pv: #f1c40f; --feedin: #e67e22; --house: #2ecc71; --wp: #9b59b6; --grid: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1600px; margin: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <div id="uploadZone" style="border: 2px dashed #3498db; padding: 20px; text-align: center; margin-bottom: 20px;">
        <input type="file" id="fileInput" multiple accept=".csv">
        <p>Lade `solar.csv` und `wp.csv` hoch.</p>
    </div>

    <div class="stats-grid" id="stats">
        <div class="stat-card"><h3>PV Erzeugung</h3><p id="vPv">-</p></div>
        <div class="stat-card"><h3>Eigenbedarf</h3><p id="vSelf">-</p></div>
        <div class="stat-card"><h3>WP Strom</h3><p id="vWp">-</p></div>
        <div class="stat-card"><h3>Netzbezug</h3><p id="vGrid">-</p></div>
        <div class="stat-card"><h3>JAZ</h3><p id="vJaz">-</p></div>
    </div>

    <div class="chart-card"><canvas id="chartMain"></canvas></div>
</div>

<script>
    let sunStore = {}, wpStore = {};

    // 1. Daten-Parser (Sehr explizit)
    function parseSun(text) {
        const data = Papa.parse(text, {header: true}).data;
        const m = {};
        data.forEach(r => {
            if(!r.Time) return;
            const k = r.Time.substring(0, 7);
            if(!m[k]) m[k] = {pv:0, self:0, feed:0, grid:0};
            // PV Brutto = Direkt + Speicher + Netz
            m[k].pv += (parseFloat(r.PvToSite)||0) + (parseFloat(r.PvToBattery)||0) + (parseFloat(r.PvToGrid)||0);
            // Eigenbedarf = Was ins Haus ging (PV direkt + Batterie Entladung)
            m[k].self += (parseFloat(r.PvToSite)||0) + (parseFloat(r.BatteryToSite)||0);
            m[k].feed += (parseFloat(r.PvToGrid)||0) + (parseFloat(r.BatteryToGrid)||0);
            m[k].grid += (parseFloat(r.GridToSite)||0) + (parseFloat(r.GridToBattery)||0);
        });
        return m;
    }

    function parseWp(text) {
        const data = Papa.parse(text, {delimiter: ";", skipEmptyLines: true}).data;
        const m = {};
        data.forEach(r => {
            if(r[0] !== "Monat") return;
            const k = r[1].includes(".") ? r[1].split(".")[1] + "-" + r[1].split(".")[0] : r[1];
            m[k] = { elec: (parseFloat(r[12]?.replace(',','.'))||0) + (parseFloat(r[17]?.replace(',','.'))||0), 
                     heat: (parseFloat(r[7]?.replace(',','.'))||0) + (parseFloat(r[12]?.replace(',','.'))||0) + (parseFloat(r[17]?.replace(',','.'))||0) };
        });
        return m;
    }

    // 2. Datei-Handling
    document.getElementById('fileInput').onchange = e => {
        Array.from(e.target.files).forEach(f => {
            const r = new FileReader();
            r.onload = ev => {
                const txt = ev.target.result;
                if(txt.includes("PvToSite")) sunStore = parseSun(txt);
                else wpStore = parseWp(txt);
                updateUI();
            };
            r.readAsText(f);
        });
    };

    // 3. UI Update
    function updateUI() {
        const keys = Array.from(new Set([...Object.keys(sunStore), ...Object.keys(wpStore)])).sort();
        const data = keys.map(m => ({ 
            m, ...sunStore[m], ...wpStore[m] 
        }));

        // Aggregierte Werte (Gesamt)
        const tPv = data.reduce((a,b)=>a+(b.pv||0),0);
        const tSelf = data.reduce((a,b)=>a+(b.self||0),0);
        const tWp = data.reduce((a,b)=>a+(b.elec||0),0);
        const tGrid = data.reduce((a,b)=>a+(b.grid||0),0);
        const tJaz = data.reduce((a,b)=>a+(b.heat||0),0) / (tWp || 1);

        document.getElementById('vPv').innerText = tPv.toFixed(0) + " kWh";
        document.getElementById('vSelf').innerText = tSelf.toFixed(0) + " kWh";
        document.getElementById('vWp').innerText = tWp.toFixed(0) + " kWh";
        document.getElementById('vGrid').innerText = tGrid.toFixed(0) + " kWh";
        document.getElementById('vJaz').innerText = tJaz.toFixed(2);

        // Chart
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(document.getElementById('chartMain'), {
            type: 'bar',
            data: { 
                labels: keys, 
                datasets: [
                    { label: 'PV Erzeugung', data: data.map(d=>d.pv), backgroundColor: '#f1c40f' },
                    { label: 'Eigenbedarf', data: data.map(d=>d.self), backgroundColor: '#2ecc71' }
                ] 
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
