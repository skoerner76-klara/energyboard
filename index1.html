<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Energie-Monitor - Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --pv: #f1c40f; --feedin: #e67e22; --house: #2ecc71; --wp: #9b59b6; --grid: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #2c3e50; }
        .container { max-width: 1400px; margin: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; border-bottom: 4px solid #ddd; }
        .stat-card h3 { font-size: 0.7em; text-transform: uppercase; color: #7f8c8d; margin: 0; }
        .stat-card p { margin: 8px 0 0; font-size: 1.1em; font-weight: bold; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center">📊 Solar-Analyse</h1>
    
    <div class="stats-grid">
        <div class="stat-card" style="border-color: var(--house)"><h3>Autarkie</h3><p id="txtAutarky">-</p></div>
        <div class="stat-card" style="border-color: #2980b9"><h3>PV Nutzung</h3><p id="txtUsage">-</p></div>
        <div class="stat-card" style="border-color: var(--pv)"><h3>Erzeugung</h3><p id="txtPv">-</p></div>
        <div class="stat-card" style="border-color: var(--house)"><h3>Eigenbedarf</h3><p id="txtSelf">-</p></div>
        <div class="stat-card" style="border-color: var(--feedin)"><h3>Einspeisung</h3><p id="txtFeed">-</p></div>
        <div class="stat-card" style="border-color: var(--grid)"><h3>Netzbezug</h3><p id="txtGrid">-</p></div>
    </div>

    <div class="chart-card"><canvas id="chartMain"></canvas></div>
    <div class="chart-card"><canvas id="chartPercent"></canvas></div>
</div>

<script>
    let sunStore = {}, chartMain = null, chartPercent = null;

    // Automatisches Laden beim Start
    window.onload = () => {
        fetch('solar.csv').then(r => r.text()).then(csv => {
            parseSolar(csv);
            render();
        }).catch(err => console.error("Fehler beim Laden:", err));
    };

    function parseSolar(csv) {
        // Die Datei nutzt Kommas (laut deiner solar.csv)
        const results = Papa.parse(csv.trim(), { header: true, skipEmptyLines: true });
        sunStore = {};

        results.data.forEach(row => {
            const time = row.Time || "";
            if (time.length < 7) return;
            const m = time.substring(0, 7); // YYYY-MM

            if (!sunStore[m]) sunStore[m] = { pvGen: 0, feed: 0, grid: 0, self: 0 };

            // Alle Pfade aus deiner Datei zusammenrechnen
            const p2g = parseFloat(row.PvToGrid) || 0;
            const b2g = parseFloat(row.BatteryToGrid) || 0;
            const p2s = parseFloat(row.PvToSite) || 0;
            const b2s = parseFloat(row.BatteryToSite) || 0;
            const p2b = parseFloat(row.PvToBattery) || 0;
            const g2s = parseFloat(row.GridToSite) || 0;
            const g2b = parseFloat(row.GridToBattery) || 0;

            sunStore[m].feed += (p2g + b2g);
            sunStore[m].grid += (g2s + g2b);
            sunStore[m].pvGen += (p2s + p2g + p2b);
            // Eigenbedarf = Was im Haus ankam (PV direkt + Batterie)
            sunStore[m].self += (p2s + b2s);
        });
    }

    function render() {
        const keys = Object.keys(sunStore).sort();
        if (keys.length === 0) return;

        const data = keys.map(m => {
            const s = sunStore[m];
            // ECHTE PV-Nutzung: Wie viel vom erzeugten Strom wurde genutzt?
            // (Wir klammern hier die Batterie-Entladung aus "altem" Strom aus, 
            // damit es nicht über 100% springt)
            const realUsageVal = s.pvGen > 0 ? (Math.min(s.pvGen, s.self) / s.pvGen * 100) : 0;
            const autarkyVal = (s.self + s.grid) > 0 ? (s.self / (s.self + s.grid) * 100) : 0;

            return { m, ...s, usage: realUsageVal, autarky: autarkyVal };
        });

        // Stats
        const last = data[data.length - 1];
        document.getElementById('txtPv').innerText = last.pvGen.toFixed(0) + " kWh";
        document.getElementById('txtSelf').innerText = last.self.toFixed(0) + " kWh";
        document.getElementById('txtFeed').innerText = last.feed.toFixed(0) + " kWh";
        document.getElementById('txtGrid').innerText = last.grid.toFixed(0) + " kWh";
        document.getElementById('txtUsage').innerText = last.usage.toFixed(1) + "%";
        document.getElementById('txtAutarky').innerText = last.autarky.toFixed(1) + "%";

        // Main Chart
        if (chartMain) chartMain.destroy();
        chartMain = new Chart(document.getElementById('chartMain'), {
            type: 'bar',
            data: {
                labels: keys,
                datasets: [
                    { label: 'PV Erzeugung', data: data.map(d=>d.pvGen), backgroundColor: '#f1c40f' },
                    { label: 'Einspeisung', data: data.map(d=>d.feed), backgroundColor: '#e67e22' },
                    { label: 'Eigenbedarf', data: data.map(d=>d.self), backgroundColor: '#2ecc71' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Prozent Chart
        if (chartPercent) chartPercent.destroy();
        chartPercent = new Chart(document.getElementById('chartPercent'), {
            type: 'line',
            plugins: [ChartDataLabels],
            data: {
                labels: keys,
                datasets: [
                    { label: 'Autarkie %', data: data.map(d=>d.autarky.toFixed(1)), borderColor: '#2ecc71' },
                    { label: 'PV Nutzung %', data: data.map(d=>d.usage.toFixed(1)), borderColor: '#2980b9' }
                ]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, max: 110 } },
                plugins: { datalabels: { align: 'top', formatter: v => v + '%' } }
            }
        });
    }
</script>
</body>
</html>
