<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Energie-Monitor - Real Production Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --pv: #f1c40f; --feedin: #e67e22; --house: #2ecc71; --wp: #9b59b6; --grid: #e74c3c; --usage: #2980b9; --bg: #f4f7f6; --money: #27ae60; --saldo: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #2c3e50; }
        .container { max-width: 1600px; margin: auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; border-radius: 8px; border: none; background: #ddd; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #3498db; color: white; }
        .range-picker { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: none; justify-content: center; align-items: center; gap: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .range-picker.visible { display: flex; }
        .stats-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; border-bottom: 4px solid #ddd; }
        .stat-card h3 { font-size: 0.65em; text-transform: uppercase; color: #7f8c8d; margin: 0; }
        .stat-card p { margin: 8px 0 0; font-size: 1.05em; font-weight: bold; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .main-chart-container { height: 400px; position: relative; }
        .side-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .upload-area { background: #fff; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; border: 3px dashed #3498db; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center">📊 Energie- & Kosten-Analyse</h1>
    
    <div class="upload-area">
        <input type="file" id="fileInput" multiple accept=".csv">
        <div id="statusLine" style="margin-top:10px; font-weight:bold; color: #3498db;">Dateien (solar.csv / wp.csv) werden gesucht...</div>
    </div>

    <div id="tabBar" class="tabs"></div>

    <div id="rangeSelector" class="range-picker">
        Von: <select id="selectStart"></select> Bis: <select id="selectEnd"></select>
        Preis: <input type="number" id="inpPrice" step="0.01"> ct
        GG: <input type="number" id="inpBase" step="0.01"> €
    </div>

    <div class="stats-grid">
        <div class="stat-card" style="border-color: var(--house)"><h3>Autarkie</h3><p id="txtAutarky">-</p></div>
        <div class="stat-card" style="border-color: var(--feedin)"><h3>JAZ (Ø)</h3><p id="txtJaz">-</p></div>
        <div class="stat-card" style="border-color: var(--usage)"><h3>PV Nutzung</h3><p id="txtPvUsagePct">-</p></div>
        <div class="stat-card" style="border-color: var(--pv)"><h3>PV Erzeugung</h3><p id="txtPvTotal">-</p></div>
        <div class="stat-card" style="border-color: var(--house)"><h3>Eigenbedarf</h3><p id="txtPvSelfTotal">-</p></div>
        <div class="stat-card" style="border-color: var(--wp)"><h3>WP Strom</h3><p id="txtWpTotal">-</p></div>
        <div class="stat-card" style="border-color: var(--grid)"><h3>Netzbezug</h3><p id="txtGridTotal">-</p></div>
        <div class="stat-card" style="border-color: var(--feedin)"><h3>Einspeisung</h3><p id="txtFeedTotal">-</p></div>
        <div class="stat-card" style="border-color: var(--saldo)"><h3>Saldo (€)</h3><p id="txtSaldo">-</p></div>
    </div>

    <div class="chart-card"><h2>Energiebilanz (kWh)</h2><div class="main-chart-container"><canvas id="chartMain"></canvas></div></div>
    <div class="side-charts">
        <div class="chart-card"><h2>Trends</h2><div style="height:300px"><canvas id="chartLines"></canvas></div></div>
        <div class="chart-card"><h2>Autarkie %</h2><div style="height:300px"><canvas id="chartAutarky"></canvas></div></div>
    </div>
</div>

<script>
    let sunStore = {}, wpStore = {}, charts = {};
    let currentMode = 'All', selectedYear = '';

    window.onload = () => {
        const savedPrice = localStorage.getItem('energy_price') || "28";
        const savedBase = localStorage.getItem('energy_base') || "10.83";
        document.getElementById('inpPrice').value = (parseFloat(savedPrice) * (savedPrice.includes('.') ? 1 : 1)).toFixed(2);
        document.getElementById('inpBase').value = parseFloat(savedBase).toFixed(2);

        Promise.all([
            fetch('solar.csv').then(r => r.ok ? r.text() : null).catch(() => null),
            fetch('wp.csv').then(r => r.ok ? r.text() : null).catch(() => null)
        ]).then(([s, w]) => {
            if(s) sunStore = parseSun(s);
            if(w) wpStore = parseWp(w);
            if(s || w) { document.getElementById('statusLine').innerText = "Daten geladen."; initDashboard(); }
        });
    };

    function parseSun(csvText) {
        const rows = Papa.parse(csvText, {header: true, skipEmptyLines: true}).data;
        const monthly = {};
        rows.forEach(row => {
            const time = (row.Time || row.time || "");
            if (time.length < 7) return;
            const key = time.substring(0, 7);
            if (!monthly[key]) monthly[key] = { grid: 0, self: 0, feed: 0, pvGen: 0 };
            
            const p2s = parseFloat(row.PvToSite) || 0;
            const p2g = parseFloat(row.PvToGrid) || 0;
            const p2b = parseFloat(row.PvToBattery) || 0;
            const b2s = parseFloat(row.BatteryToSite) || 0;
            const b2g = parseFloat(row.BatteryToGrid) || 0;
            const g2s = parseFloat(row.GridToSite) || 0;
            const g2b = parseFloat(row.GridToBattery) || 0;

            // REALE ERZEUGUNG: Alles was von den Modulen kam
            monthly[key].pvGen += (p2s + p2g + p2b);
            // REALE EINSPEISUNG: Direkt PV + Batterie Entladung ins Netz
            monthly[key].feed += (p2g + b2g);
            // REALER EIGENVERBRAUCH: Direkt PV + Batterie Entladung ins Haus
            monthly[key].self += (p2s + b2s);
            // REALER BEZUG: Netz zu Haus + Netz zu Batterie
            monthly[key].grid += (g2s + g2b);
        });
        return monthly;
    }

    function parseWp(csvText) {
        const rows = Papa.parse(csvText.trim(), {delimiter: ";", skipEmptyLines: true}).data;
        const monthly = {};
        rows.forEach(row => {
            if ((row[0]||"").toString().toLowerCase() === "monat") {
                let key = row[1];
                if (key.includes(".")) { const p = key.split("."); key = `${p[p.length-1]}-${p[p.length-2].padStart(2, '0')}`; }
                const h = cleanNum(row[7]), m = cleanNum(row[12]), r = cleanNum(row[17]);
                if (m+r > 0 || h > 0) monthly[key] = { elec: (m + r), heat: (h+m+r), hasHeat: h > 0.5 };
            }
        });
        return monthly;
    }

    function cleanNum(val) { return parseFloat(val?.toString().replace(/\./g, '').replace(',', '.')) || 0; }

    function initDashboard() {
        const keys = Array.from(new Set([...Object.keys(sunStore), ...Object.keys(wpStore)])).sort();
        const years = Array.from(new Set(keys.map(k => k.split('-')[0]))).sort();
        const tabBar = document.getElementById('tabBar'); tabBar.innerHTML = '';
        const createBtn = (label, mode, yr = '') => {
            const btn = document.createElement('button'); btn.innerText = label;
            btn.className = 'tab-btn' + (currentMode === mode && yr === selectedYear ? ' active' : '');
            btn.onclick = () => { currentMode = mode; selectedYear = yr; render(); };
            tabBar.appendChild(btn);
        };
        createBtn('Gesamt', 'All');
        years.forEach(y => createBtn(y, 'Year', y));
        const startSel = document.getElementById('selectStart'), endSel = document.getElementById('selectEnd');
        startSel.innerHTML = endSel.innerHTML = '';
        keys.forEach(k => { startSel.add(new Option(k, k)); endSel.add(new Option(k, k)); });
        [startSel, endSel, document.getElementById('inpPrice'), document.getElementById('inpBase')].forEach(el => {
            el.oninput = () => { 
                if(el.id.includes('Price')) localStorage.setItem('energy_price', el.value);
                if(el.id.includes('Base')) localStorage.setItem('energy_base', el.value);
                render(); 
            };
        });
        render();
    }

    function render() {
        let keys = Array.from(new Set([...Object.keys(sunStore), ...Object.keys(wpStore)])).sort();
        if (currentMode === 'Year') keys = keys.filter(k => k.startsWith(selectedYear));
        const price = parseFloat(document.getElementById('inpPrice').value)/100 || 0.28;
        const base = parseFloat(document.getElementById('inpBase').value) || 10.83;
        
        const data = keys.map(m => {
            const s = sunStore[m] || {grid:0, self:0, feed:0, pvGen:0};
            const w = wpStore[m] || {elec:0, heat:0};
            return { m, ...s, ...w, totalNeed: s.grid + s.self };
        });

        const tGrid = data.reduce((a,b)=>a+b.grid,0), tSelf = data.reduce((a,b)=>a+b.self,0), tPv = data.reduce((a,b)=>a+b.pvGen,0), tFeed = data.reduce((a,b)=>a+b.feed,0);
        const cost = (tGrid * price) + (keys.length * base);
        const earn = tFeed * 0.0795;

        document.getElementById('txtPvTotal').innerText = tPv.toFixed(0) + " kWh";
        document.getElementById('txtPvSelfTotal').innerText = tSelf.toFixed(0) + " kWh";
        document.getElementById('txtGridTotal').innerHTML = `${tGrid.toFixed(0)} kWh <br><small>${cost.toFixed(2)}€</small>`;
        document.getElementById('txtFeedTotal').innerHTML = `${tFeed.toFixed(0)} kWh <br><small>${earn.toFixed(2)}€</small>`;
        document.getElementById('txtSaldo').innerText = (cost - earn).toFixed(2) + " €";
        document.getElementById('txtAutarky').innerText = (tGrid+tSelf > 0) ? (tSelf/(tGrid+tSelf)*100).toFixed(1)+"%" : "-";
        document.getElementById('txtPvUsagePct').innerText = (tPv > 0) ? (tSelf/tPv*100).toFixed(1)+"%" : "-";

        Object.values(charts).forEach(c => c?.destroy());
        const ctx = document.getElementById('chartMain');
        charts.main = new Chart(ctx, {
            type: 'bar',
            data: { labels: keys, datasets: [
                { label: 'PV Erzeugung', data: data.map(d=>d.pvGen), backgroundColor: '#f1c40f' },
                { label: 'Eigenbedarf', data: data.map(d=>d.self), backgroundColor: '#2ecc71' },
                { label: 'Netzbezug', data: data.map(d=>d.grid), backgroundColor: '#e74c3c' },
                { label: 'Einspeisung', data: data.map(d=>d.feed), backgroundColor: '#e67e22' }
            ]}, options: { responsive: true, maintainAspectRatio: false }
        });
    }

    document.getElementById('fileInput').onchange = e => {
        Array.from(e.target.files).forEach(f => {
            const r = new FileReader();
            r.onload = (ev) => {
                if(ev.target.result.includes("PvToSite")) sunStore = parseSun(ev.target.result); else wpStore = parseWp(ev.target.result);
                initDashboard();
            };
            r.readAsText(f);
        });
    };
</script>
</body>
</html>
