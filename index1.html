<script>
    // ... (CSS und HTML bleiben identisch wie in deiner Vorlage)

    function parseSun(csvText) {
        const rows = Papa.parse(csvText, {header: true, skipEmptyLines: true}).data;
        const monthly = {};
        rows.forEach(row => {
            const time = row.Time || row.time || "";
            if (time.length < 7) return;
            const key = time.substring(0, 7);
            
            const g2s = parseFloat(row.GridToSite) || 0, g2b = parseFloat(row.GridToBattery) || 0;
            const p2s = parseFloat(row.PvToSite) || 0, b2s = parseFloat(row.BatteryToSite) || 0;
            const p2g = parseFloat(row.PvToGrid) || 0, b2g = parseFloat(row.BatteryToGrid) || 0;
            const p2b = parseFloat(row.PvToBattery) || 0;

            if (g2s+g2b+p2s+b2s+p2g+b2g+p2b === 0) return;

            if (!monthly[key]) monthly[key] = { grid: 0, self: 0, feed: 0, pvGen: 0 };
            
            monthly[key].grid += (g2s + g2b);
            monthly[key].self += (p2s + b2s); // Das ist der gesamte Eigenverbrauch (Haus + WP)
            monthly[key].feed += (p2g + b2g); // Februar-Fix: Batterie-Einspeisung dabei
            monthly[key].pvGen += (p2s + p2g + p2b); // Alles was die PV-Module erzeugt haben
        });
        return monthly;
    }

    function render() {
        // ... (Logik für Keys und Preise identisch)

        const data = keys.map(m => {
            const wp = wpStore[m] || {elec:0, heat:0, tAussen:0, tVorlauf:0, hasHeat:false};
            const sun = sunStore[m] || {grid:0, self:0, feed:0, pvGen:0};
            
            const totalNeed = sun.self + sun.grid;
            // Der Hausverbrauch ohne WP ist der gesamte Eigenverbrauch minus WP-Strom
            // Da WP-Strom auch aus dem Netz kommen kann, begrenzen wir das auf den Eigenanteil
            const wpFromPv = Math.min(wp.elec, sun.self); 
            const housePurePv = Math.max(0, sun.self - wpFromPv);

            return { 
                m, 
                pvGen: sun.pvGen, 
                totalNeed, 
                housePure: housePurePv, 
                wpEigen: wpFromPv,
                ...wp, 
                ...sun,
                autarky: totalNeed > 0 ? (sun.self / totalNeed * 100) : 0, 
                usage: sun.pvGen > 0 ? (sun.self / sun.pvGen * 100) : 0 
            };
        });

        // ... (Stats-Updates identisch)

        if(charts.main) charts.main.destroy();
        charts.main = new Chart(document.getElementById('chartMain'), {
            type: 'bar', 
            data: { 
                labels: keys, 
                datasets: [
                    { label: 'PV Erzeugung', data: data.map(d=>d.pvGen), backgroundColor: '#f1c40f', stack: '0' },
                    { label: 'Einspeisung', data: data.map(d=>d.feed), backgroundColor: '#e67e22', stack: '1' },
                    { label: 'Haus (Eigen)', data: data.map(d=>d.housePure), backgroundColor: '#2ecc71', stack: '2' },
                    { label: 'WP (Eigen)', data: data.map(d=>d.wpEigen), backgroundColor: '#9b59b6', stack: '2' },
                    { label: 'Netzbezug', data: data.map(d=>d.grid), backgroundColor: '#e74c3c', stack: '3' }
                ]
            }, 
            options: { responsive: true, maintainAspectRatio: false } 
        });

        // ... (Restliche Diagramme identisch)
    }
</script>
