<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Energie-Monitor Pro - Final</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --pv: #f1c40f; --feedin: #e67e22; --house: #2ecc71; --wp: #9b59b6; --grid: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 20px; color: #2c3e50; }
        .container { max-width: 1400px; margin: auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { padding: 10px 20px; border-radius: 8px; border: none; background: #ddd; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #3498db; color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-bottom: 4px solid #ddd; }
        .stat-card h3 { font-size: 0.7em; text-transform: uppercase; color: #7f8c8d; margin: 0; }
        .stat-card p { margin: 5px 0 0; font-size: 1.2em; font-weight: bold; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; height: 450px; }
        .upload-area { background: #fff; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; border: 2px dashed #3498db; }
        .controls { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: center; gap: 20px; font-size: 0.9em; }
        input { width: 70px; padding: 5px; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center">☀️ Solar- & Wärmepumpen Analyse</h1>
    
    <div class="upload-area">
        <input type="file" id="fileInput" multiple accept=".csv">
        <p id="statusLine" style="margin: 5px 0 0; font-size: 0.9em; color: #3498db;">Dateien solar.csv und wp.csv werden automatisch gesucht...</p>
    </div>

    <div class="controls">
        <div>Strompreis: <input type="number" id="inpPrice" step="0.01"> ct/kWh</div>
        <div>Grundgebühr: <input type="number" id="inpBase" step="0.01"> €/Monat</div>
    </div>

    <div id="tabBar" class="tabs"></div>

    <div class="stats-grid">
        <div class="stat-card" style="border-color: var(--house)"><h3>Autarkie</h3><p id="txtAutarky">-</p></div>
        <div class="stat-card" style="border-color: var(--pv)"><h3>PV Erzeugung</h3><p id="txtPvTotal">-</p></div>
        <div class="stat-card" style="border-color: var(--house)"><h3>Eigenverbrauch</h3><p id="txtSelf">-</p></div>
        <div class="stat-card" style="border-color: var(--grid)"><h3>Netzbezug</h3><p id="txtGrid">-</p></div>
        <div class="stat-card" style="border-color: var(--feedin)"><h3>Einspeisung</h3><p id="txtFeed">-</p></div>
        <div class="stat-card" style="border-color: var(--wp)"><h3>WP Strom</h3><p id="txtWp">-</p></div>
        <div class="stat-card" style="border-color: var(--feedin)"><h3>JAZ Ø</h3><p id="txtJaz">-</p></div>
        <div class="stat-card" style="border-color: #2c3e50"><h3>Saldo</h3><p id="txtSaldo">-</p></div>
    </div>

    <div class="chart-card">
        <canvas id="chartMain"></canvas>
    </div>
</div>

<script>
    let sunStore = {}, wpStore = {}, mainChart = null;
    let currentMode = 'All', selectedYear = '';

    window.onload = () => {
        // LocalStorage & Defaults
        document.getElementById('inpPrice').value = localStorage.getItem('energy_price') || "28.00";
        document.getElementById('inpBase').value = localStorage.getItem('energy_base') || "10.83";

        // Auto-Load
        Promise.all([
            fetch('solar.csv').then(r => r.ok ? r.text() : null).catch(() => null),
            fetch('wp.csv').then(r => r.ok ? r.text() : null).catch(() => null)
        ]).then(([s, w]) => {
            if(s) sunStore = parseSolar(s);
            if(w) wpStore = parseWP(w);
            updateUI();
        });
    };

    function parseSolar(csv) {
        const data = {};
        const rows = Papa.parse(csv, {header: true, skipEmptyLines: true}).data;
        rows.forEach(r => {
            const m = (r.Time || r.time || "").substring(0, 7);
            if(m.length < 7) return;
            if(!data[m]) data[m] = { pv: 0, feed: 0, grid: 0, self: 0 };
            
            const p2s = parseFloat(r.PvToSite) || 0, p2g = parseFloat(r.PvToGrid) || 0, p2b = parseFloat(r.PvToBattery) || 0;
            const b2s = parseFloat(r.BatteryToSite) || 0, b2g = parseFloat(r.BatteryToGrid) || 0;
            const g2s = parseFloat(r.GridToSite) || 0, g2b = parseFloat(r.GridToBattery) || 0;

            data[m].pv += (p2s + p2g + p2b);
            data[m].feed += (p2g + b2g);
            data[m].grid += (g2s + g2b);
            data[m].self += (p2s + b2s);
        });
        return data;
    }

    function parseWP(csv) {
        const data = {};
        const rows = Papa.parse(csv.trim(), {delimiter: ";", skipEmptyLines: true}).data;
        rows.forEach(r => {
            if ((r[0]||"").toString().toLowerCase() === "monat") {
                let m = r[1];
                if(m.includes(".")) { const p = m.split("."); m = `${p[2]}-${p[1].padStart(2,'0')}`; }
                const heat = cleanN(r[7]), elM = cleanN(r[12]), elR = cleanN(r[17]);
                if(elM + elR > 0) data[m] = { elec: elM + elR, heat: heat + elM + elR };
            }
        });
        return data;
    }

    function cleanN(v) { return parseFloat(v?.toString().replace(/\./g, '').replace(',', '.')) || 0; }

    function updateUI() {
        const keys = Array.from(new Set([...Object.keys(sunStore), ...Object.keys(wpStore)])).sort();
        if(keys.length === 0) return;

        const years = Array.from(new Set(keys.map(k => k.split('-')[0]))).sort();
        const tabBar = document.getElementById('tabBar');
        tabBar.innerHTML = '';

        const addTab = (label, mode, yr = '') => {
            const btn = document.createElement('button');
            btn.innerText = label;
            btn.className = 'tab-btn' + (currentMode === mode && selectedYear === yr ? ' active' : '');
            btn.onclick = () => { currentMode = mode; selectedYear = yr; updateUI(); };
            tabBar.appendChild(btn);
        };

        addTab('Gesamt', 'All');
        years.forEach(y => addTab(y, 'Year', y));

        render(keys);
    }

    function render(allKeys) {
        let keys = allKeys;
        if(currentMode === 'Year') keys = keys.filter(k => k.startsWith(selectedYear));

        const price = parseFloat(document.getElementById('inpPrice').value)/100 || 0.28;
        const base = parseFloat(document.getElementById('inpBase').value) || 10.83;
        localStorage.setItem('energy_price', document.getElementById('inpPrice').value);
        localStorage.setItem('energy_base', document.getElementById('inpBase').value);

        const data = keys.map(k => ({
            k, 
            s: sunStore[k] || {pv:0, feed:0, grid:0, self:0},
            w: wpStore[k] || {elec:0, heat:0}
        }));

        const totals = data.reduce((a, b) => ({
            pv: a.pv+b.s.pv, feed: a.feed+b.s.feed, grid: a.grid+b.s.grid, 
            self: a.self+b.s.self, elec: a.elec+b.w.elec, heat: a.heat+b.w.heat
        }), {pv:0, feed:0, grid:0, self:0, elec:0, heat:0});

        const cost = (totals.grid * price) + (keys.length * base);
        const earn = totals.feed * 0.0795;

        document.getElementById('txtPvTotal').innerText = totals.pv.toFixed(0) + " kWh";
        document.getElementById('txtSelf').innerText = totals.self.toFixed(0) + " kWh";
        document.getElementById('txtGrid').innerText = totals.grid.toFixed(0) + " kWh";
        document.getElementById('txtFeed').innerText = totals.feed.toFixed(0) + " kWh";
        document.getElementById('txtWp').innerText = totals.elec.toFixed(0) + " kWh";
        document.getElementById('txtJaz').innerText = totals.elec > 0 ? (totals.heat/totals.elec).toFixed(2) : "-";
        document.getElementById('txtAutarky').innerText = (totals.grid+totals.self > 0) ? (totals.self/(totals.grid+totals.self)*100).toFixed(1) + "%" : "-";
        document.getElementById('txtSaldo').innerText = (cost - earn).toFixed(2) + " €";

        if(mainChart) mainChart.destroy();
        mainChart = new Chart(document.getElementById('chartMain'), {
            type: 'bar',
            data: {
                labels: keys,
                datasets: [
                    { label: 'PV Erzeugung', data: data.map(d => d.s.pv), backgroundColor: '#f1c40f' },
                    { label: 'Eigenverbrauch', data: data.map(d => d.s.self), backgroundColor: '#2ecc71' },
                    { label: 'Netzbezug', data: data.map(d => d.s.grid), backgroundColor: '#e74c3c' },
                    { label: 'Wärmepumpe', data: data.map(d => d.w.elec), backgroundColor: '#9b59b6' },
                    { label: 'Einspeisung', data: data.map(d => d.s.feed), backgroundColor: '#e67e22' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, title: { display: true, text: 'kWh' } } } }
        });
    }

    document.getElementById('fileInput').onchange = e => {
        const files = Array.from(e.target.files);
        let count = 0;
        files.forEach(f => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                if(ev.target.result.includes("PvToSite")) sunStore = parseSolar(ev.target.result);
                else wpStore = parseWP(ev.target.result);
                count++;
                if(count === files.length) updateUI();
            };
            reader.readAsText(f);
        });
    };
    
    document.getElementById('inpPrice').oninput = updateUI;
    document.getElementById('inpBase').oninput = updateUI;
</script>
</body>
</html>
