<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Energie-Monitor - Stable Build</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --pv: #f1c40f; --feedin: #e67e22; --house: #2ecc71; --wp: #9b59b6; --grid: #e74c3c; --usage: #2980b9; --bg: #f4f7f6; --money: #27ae60; --saldo: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #2c3e50; }
        .container { max-width: 1600px; margin: auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; border-radius: 8px; border: none; background: #ddd; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #3498db; color: white; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; border-bottom: 4px solid #ddd; }
        .stat-card h3 { font-size: 0.7em; text-transform: uppercase; color: #7f8c8d; margin: 0; }
        .stat-card p { margin: 8px 0 0; font-size: 1.1em; font-weight: bold; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .main-chart-container { height: 400px; }
        .side-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .upload-area { background: #fff; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; border: 3px dashed #3498db; }
        @media (max-width: 800px) { .side-charts { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center">📊 Energie-Monitor</h1>
    <div class="upload-area">
        <input type="file" id="fileInput" multiple accept=".csv">
        <p>CSV-Dateien (Solar & WP) hier auswählen</p>
    </div>
    <div id="tabBar" class="tabs"></div>

    <div class="stats-grid">
        <div class="stat-card" style="border-color: var(--house)"><h3>Autarkie</h3><p id="txtAutarky">-</p></div>
        <div class="stat-card" style="border-color: var(--usage)"><h3>PV Nutzung</h3><p id="txtPvUsagePct">-</p></div>
        <div class="stat-card" style="border-color: var(--pv)"><h3>Erzeugung</h3><p id="txtPvTotal">-</p></div>
        <div class="stat-card" style="border-color: var(--house)"><h3>Eigenbedarf</h3><p id="txtPvSelfTotal">-</p></div>
        <div class="stat-card" style="border-color: var(--grid)"><h3>Netzbezug</h3><p id="txtGridTotal">-</p></div>
        <div class="stat-card" style="border-color: var(--feedin)"><h3>Einspeisung</h3><p id="txtFeedTotal">-</p></div>
        <div class="stat-card" style="border-color: var(--saldo)"><h3>Saldo</h3><p id="txtSaldo">-</p></div>
    </div>

    <div class="chart-card"><h2>Energiebilanz (kWh)</h2><div class="main-chart-container"><canvas id="chartMain"></canvas></div></div>
    <div class="side-charts">
        <div class="chart-card"><h2>Trends</h2><div style="height:300px"><canvas id="chartLines"></canvas></div></div>
        <div class="chart-card"><h2>Autarkie (%)</h2><div style="height:300px"><canvas id="chartAutarky"></canvas></div></div>
    </div>
</div>

<script>
    let sunStore = {}, wpStore = {}, charts = {};
    let currentMode = 'All', selectedYear = '';

    const cleanNum = (v) => { if(!v) return 0; let s = v.toString().replace(/\./g, '').replace(',', '.'); return parseFloat(s) || 0; };

    function parseSun(csvText) {
        const rows = Papa.parse(csvText, {header: true, skipEmptyLines: true}).data;
        const monthly = {};
        rows.forEach(row => {
            const time = row.Time || row.time || "";
            if (time.length < 7) return;
            const key = time.substring(0, 7);
            if (!monthly[key]) monthly[key] = { grid: 0, feed: 0, pvGen: 0, self: 0 };
            
            const p2s = parseFloat(row.PvToSite) || 0;
            const b2s = parseFloat(row.BatteryToSite) || 0;
            const p2g = parseFloat(row.PvToGrid) || 0;
            const b2g = parseFloat(row.BatteryToGrid) || 0;
            const p2b = parseFloat(row.PvToBattery) || 0;

            monthly[key].grid += (parseFloat(row.GridToSite) || 0) + (parseFloat(row.GridToBattery) || 0);
            monthly[key].feed += (p2g + b2g);
            monthly[key].pvGen += (p2s + p2g + p2b);
            monthly[key].self += (p2s + b2s);
        });
        return monthly;
    }

    function parseWp(csvText) {
        const rows = Papa.parse(csvText.trim(), {delimiter: ";", skipEmptyLines: true}).data;
        const monthly = {};
        rows.forEach(row => {
            if ((row[0]||"").toString().toLowerCase() === "monat") {
                let key = row[1];
                if (key.includes(".")) { const p = key.split("."); key = `${p[p.length-1]}-${p[p.length-2].padStart(2, '0')}`; }
                monthly[key] = { elec: (cleanNum(row[12]) + cleanNum(row[17])), heat: (cleanNum(row[7]) + cleanNum(row[12]) + cleanNum(row[17])) };
            }
        });
        return monthly;
    }

    function render() {
        let keys = Array.from(new Set([...Object.keys(sunStore), ...Object.keys(wpStore)])).sort();
        if (currentMode === 'Year') keys = keys.filter(k => k.startsWith(selectedYear));
        
        const data = keys.map(m => {
            const s = sunStore[m] || {grid:0, feed:0, pvGen:0, self:0};
            const w = wpStore[m] || {elec:0, heat:0};
            
            // Die "Sicherheitslogik" gegen kaputte Februar-Werte:
            // Wenn eingespeist wurde, kann der Eigenbedarf nicht höher als (Erzeugung) sein.
            const displaySelf = (s.feed > 0) ? Math.min(s.self, s.pvGen) : s.self;
            const autarky = (displaySelf + s.grid) > 0 ? (displaySelf / (displaySelf + s.grid) * 100) : 0;
            const usage = s.pvGen > 0 ? (displaySelf / s.pvGen * 100) : 0;

            return { m, ...s, ...w, displaySelf, autarky, usage };
        }).filter(d => (d.pvGen + d.grid) > 0);

        if (data.length === 0) return;

        // Stats Updates
        const tPv = data.reduce((a,b)=>a+b.pvGen,0), tSelf = data.reduce((a,b)=>a+b.displaySelf,0), tGrid = data.reduce((a,b)=>a+b.grid,0), tFeed = data.reduce((a,b)=>a+b.feed,0);
        document.getElementById('txtPvTotal').innerText = tPv.toFixed(0) + " kWh";
        document.getElementById('txtAutarky').innerText = ((tSelf/(tSelf+tGrid))*100).toFixed(1) + "%";
        document.getElementById('txtFeedTotal').innerText = tFeed.toFixed(0) + " kWh";

        // Charts
        Object.values(charts).forEach(c => c.destroy());
        const ctxMain = document.getElementById('chartMain').getContext('2d');
        charts.main = new Chart(ctxMain, {
            type: 'bar',
            data: {
                labels: data.map(d=>d.m),
                datasets: [
                    { label: 'Erzeugung', data: data.map(d=>d.pvGen), backgroundColor: '#f1c40f' },
                    { label: 'Eigenbedarf', data: data.map(d=>d.displaySelf), backgroundColor: '#2ecc71' },
                    { label: 'Netzbezug', data: data.map(d=>d.grid), backgroundColor: '#e74c3c' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        charts.aut = new Chart(document.getElementById('chartAutarky'), {
            type: 'line',
            plugins: [ChartDataLabels],
            data: {
                labels: data.map(d=>d.m),
                datasets: [
                    { label: 'Autarkie %', data: data.map(d=>Math.min(100, d.autarky).toFixed(1)), borderColor: '#2ecc71', clip: false },
                    { label: 'Nutzung %', data: data.map(d=>Math.min(100, d.usage).toFixed(1)), borderColor: '#2980b9', clip: false }
                ]
            },
            options: { 
                scales: { y: { max: 115, beginAtZero: true } },
                plugins: { datalabels: { 
                    formatter: (v, ctx) => {
                        // Zeige den echten Wert im Label, auch wenn die Linie bei 100 stoppt
                        const real = ctx.datasetIndex === 0 ? data[ctx.dataIndex].autarky : data[ctx.dataIndex].usage;
                        return real.toFixed(1) + '%';
                    },
                    align: 'top'
                }}
            }
        });
    }

    document.getElementById('fileInput').onchange = e => {
        Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const text = ev.target.result;
                if (text.includes("PvToSite")) sunStore = parseSun(text);
                else wpStore = parseWp(text);
                render();
            };
            reader.readAsText(file);
        });
    };
</script>
</body>
</html>
