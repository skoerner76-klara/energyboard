<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Energie-Monitor Pro - Donut Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --pv: #f1c40f; --feedin: #e67e22; --house: #2ecc71; --wp: #9b59b6; --grid: #e74c3c; --usage: #2980b9; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #2c3e50; }
        .container { max-width: 1600px; margin: auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { padding: 10px 20px; border-radius: 8px; border: none; background: #ddd; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #3498db; color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; border-bottom: 4px solid #ddd; }
        .stat-card h3 { font-size: 0.65em; text-transform: uppercase; color: #7f8c8d; margin: 0; }
        .stat-card p { margin: 8px 0 0; font-size: 1.05em; font-weight: bold; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .donut-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .side-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 800px) { .donut-grid, .side-charts { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center">📊 Energie-Monitor Live</h1>
    <div id="statusLine" style="text-align:center; font-weight:bold; color: #3498db; margin-bottom: 20px;">Lade Daten...</div>

    <div id="tabBar" class="tabs"></div>

    <div class="stats-grid">
        <div class="stat-card" style="border-color: var(--house)"><h3>Autarkie</h3><p id="txtAutarky">-</p></div>
        <div class="stat-card" style="border-color: var(--feedin)"><h3>JAZ (Ø)</h3><p id="txtJaz">-</p></div>
        <div class="stat-card" style="border-color: var(--pv)"><h3>PV Erzeugung</h3><p id="txtPvTotal">-</p></div>
        <div class="stat-card" style="border-color: var(--grid)"><h3>Netzbezug</h3><p id="txtGridTotal">-</p></div>
        <div class="stat-card" style="border-color: var(--saldo)"><h3>Saldo (€)</h3><p id="txtSaldo">-</p></div>
    </div>

    <div class="donut-grid">
        <div class="chart-card"><h3>Haus-Energiequellen (Woher kommt der Strom?)</h3><div style="height:250px"><canvas id="donutSources"></canvas></div></div>
        <div class="chart-card"><h3>PV-Nutzung (Wohin geht der Strom?)</h3><div style="height:250px"><canvas id="donutUsage"></canvas></div></div>
    </div>

    <div class="chart-card"><h2>Energiebilanz</h2><div style="height:350px"><canvas id="chartMain"></canvas></div></div>
    
    <div class="side-charts">
        <div class="chart-card"><h2>Autarkie & Eigennutzung (%)</h2><div style="height:280px"><canvas id="chartAutarky"></canvas></div></div>
        <div class="chart-card"><h2>Monats-JAZ Effizienz</h2><div style="height:280px"><canvas id="chartEff"></canvas></div></div>
    </div>
</div>

<script>
    const DEFAULT_PREIS = 0.293, DEFAULT_GG = 10.83, VERGUETUNG_PV = 0.0795;
    let sunStore = {}, wpStore = {}, charts = {}, currentMode = 'All', selectedYear = '';

    async function loadDataFromServer() {
        const files = ['solar.csv', 'wp.csv'];
        for (const file of files) {
            try {
                const response = await fetch(file + '?t=' + Date.now());
                if (response.ok) {
                    const text = await response.text();
                    processData(text, file);
                }
            } catch (e) { console.error("Fehler", e); }
        }
    }

    window.onload = () => {
        const savedSun = localStorage.getItem('sunStore');
        const savedWp = localStorage.getItem('wpStore');
        if(savedSun) sunStore = JSON.parse(savedSun);
        if(savedWp) wpStore = JSON.parse(savedWp);
        if(savedSun || savedWp) initDashboard();
        loadDataFromServer();
    };

    function processData(text, name) {
        if (text.includes("PvToSite") || name.toLowerCase().includes("solar")) {
            sunStore = parseSun(text);
            localStorage.setItem('sunStore', JSON.stringify(sunStore));
        } else {
            wpStore = parseWp(text);
            localStorage.setItem('wpStore', JSON.stringify(wpStore));
        }
        document.getElementById('statusLine').innerText = "Daten live von GitHub.";
        initDashboard();
    }

    function cleanNum(val) { return parseFloat(val?.toString().replace(/\./g, '').replace(',', '.')) || 0; }

    function parseWp(csvText) {
        const rows = Papa.parse(csvText.trim(), {delimiter: ";", skipEmptyLines: true}).data;
        const monthly = {};
        rows.forEach(row => {
            if ((row[0]||"").toString().toLowerCase() === "monat") {
                let key = row[1];
                if (key.includes(".")) { const p = key.split("."); key = `${p[p.length-1]}-${p[p.length-2].padStart(2, '0')}`; }
                const heatProd = cleanNum(row[7]), wpElec = cleanNum(row[12]), addElec = cleanNum(row[17]);
                monthly[key] = { elec: (wpElec + addElec), heat: (heatProd + wpElec + addElec), hasHeat: heatProd > 0.5 };
            }
        });
        return monthly;
    }

    function parseSun(csvText) {
        const rows = Papa.parse(csvText, {header: true, skipEmptyLines: true}).data;
        const monthly = {};
        rows.forEach(row => {
            const time = (row.Time || row.time || "").substring(0, 7);
            if (!time) return;
            if (!monthly[time]) monthly[time] = { grid: 0, self: 0, feed: 0 };
            monthly[time].grid += parseFloat(row.GridToSite) || 0;
            monthly[time].self += (parseFloat(row.PvToSite) || 0) + (parseFloat(row.BatteryToSite) || 0);
            monthly[time].feed += (parseFloat(row.PvToGrid) || 0) + (parseFloat(row.BatteryToGrid) || 0);
        });
        return monthly;
    }

    function initDashboard() {
        const keys = Array.from(new Set([...Object.keys(sunStore), ...Object.keys(wpStore)])).sort();
        const years = Array.from(new Set(keys.map(k => k.split('-')[0]))).sort();
        const tabBar = document.getElementById('tabBar');
        tabBar.innerHTML = '';
        const createBtn = (label, mode, yr = '') => {
            const btn = document.createElement('button');
            btn.innerText = label;
            btn.className = 'tab-btn' + (currentMode === mode && yr === selectedYear ? ' active' : '');
            btn.onclick = () => { currentMode = mode; selectedYear = yr; initDashboard(); };
            tabBar.appendChild(btn);
        }
        createBtn('Gesamt', 'All');
        years.forEach(y => createBtn(y, 'Year', y));
        render();
    }

    function render() {
        let keys = Array.from(new Set([...Object.keys(sunStore), ...Object.keys(wpStore)])).sort();
        if (currentMode === 'Year') keys = keys.filter(k => k.startsWith(selectedYear));
        
        const data = keys.map(m => {
            const wp = wpStore[m] || {elec:0, heat:0};
            const sun = sunStore[m] || {grid:0, self:0, feed:0};
            return { m, ...wp, ...sun, pvGen: sun.self + sun.feed, totalNeed: sun.self + sun.grid };
        });

        const tGrid = data.reduce((s,d)=>s+d.grid,0), tSelf = data.reduce((s,d)=>s+d.self,0), tPv = data.reduce((s,d)=>s+d.pvGen,0), tFeed = data.reduce((s,d)=>s+d.feed,0);
        
        document.getElementById('txtPvTotal').innerText = tPv.toFixed(0) + " kWh";
        document.getElementById('txtAutarky').innerText = (tGrid+tSelf > 0) ? (tSelf/(tGrid+tSelf)*100).toFixed(1)+"%" : "-";
        document.getElementById('txtGridTotal').innerText = tGrid.toFixed(0) + " kWh";
        document.getElementById('txtSaldo').innerText = (tGrid*DEFAULT_PREIS + data.length*DEFAULT_GG - tFeed*VERGUETUNG_PV).toFixed(2) + " €";
        const active = data.filter(d => d.hasHeat);
        document.getElementById('txtJaz').innerText = active.length ? (active.reduce((s,d)=>s+d.heat,0)/active.reduce((s,d)=>s+d.elec,0)).toFixed(2) : "-";

        updateCharts(keys, data, tGrid, tSelf, tPv, tFeed);
    }

    function updateCharts(labels, data, tGrid, tSelf, tPv, tFeed) {
        Object.values(charts).forEach(c => c?.destroy());
        const opt = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } };

        // 1. Donut: Hausquellen
        charts.donutSources = new Chart(document.getElementById('donutSources'), {
            type: 'doughnut',
            data: { labels: ['PV Eigenstrom', 'Netzbezug'], datasets: [{ data: [tSelf, tGrid], backgroundColor: ['#2ecc71', '#e74c3c'] }]},
            options: opt
        });

        // 2. Donut: PV Nutzung
        charts.donutUsage = new Chart(document.getElementById('donutUsage'), {
            type: 'doughnut',
            data: { labels: ['Eigenverbrauch', 'Einspeisung'], datasets: [{ data: [tSelf, tFeed], backgroundColor: ['#2ecc71', '#e67e22'] }]},
            options: opt
        });

        // Restliche Charts
        charts.main = new Chart(document.getElementById('chartMain'), {
            type: 'bar', data: { labels: labels, datasets: [
                { label: 'Netzbezug', data: data.map(d=>d.grid), backgroundColor: '#e74c3c' },
                { label: 'PV Eigenverbrauch', data: data.map(d=>d.self), backgroundColor: '#2ecc71' },
                { label: 'Einspeisung', data: data.map(d=>d.feed), backgroundColor: '#e67e22' }
            ]}, options: opt 
        });

        charts.aut = new Chart(document.getElementById('chartAutarky'), {
            type: 'line', data: { labels: labels, datasets: [
                { label: 'Autarkie (%)', data: data.map(d=>d.totalNeed > 0 ? (d.self/d.totalNeed*100).toFixed(1) : 0), borderColor: '#2ecc71' },
                { label: 'PV Nutzung (%)', data: data.map(d=>d.pvGen > 0 ? (d.self/d.pvGen*100).toFixed(1) : 0), borderColor: '#2980b9' }
            ]}, options: { ...opt, scales: { y: { min: 0, max: 100 } } }
        });

        charts.eff = new Chart(document.getElementById('chartEff'), {
            type: 'line', data: { labels: labels, datasets: [{ label: 'Monats-JAZ', data: data.map(d=>d.hasHeat && d.elec>0 ? (d.heat/d.elec).toFixed(2) : null), borderColor: '#e67e22', spanGaps: true }] },
            options: { ...opt, scales: { y: { suggestedMin: 2, suggestedMax: 5 } } }
        });
    }
</script>
</body>
</html>
