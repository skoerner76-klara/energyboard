<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Energie-Monitor Pro - Clean Version</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --pv: #f1c40f; --feedin: #e67e22; --house: #2ecc71; --wp: #9b59b6; --grid: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #2c3e50; }
        .container { max-width: 1400px; margin: auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { padding: 10px 20px; border-radius: 8px; border: none; background: #ddd; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #3498db; color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; border-bottom: 4px solid #ddd; }
        .stat-card p { margin: 5px 0 0; font-size: 1.2em; font-weight: bold; }
        .donut-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2 { font-size: 1.1em; margin-bottom: 15px; color: #34495e; border-left: 4px solid #3498db; padding-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center">📊 Energie-Analyse Pro</h1>
    <div id="statusLine" style="text-align:center; color:#3498db; margin-bottom:15px;">Daten-Sync aktiv...</div>

    <div id="tabBar" class="tabs"></div>

    <div class="stats-grid">
        <div class="stat-card" style="border-color: var(--house)"><h3>Autarkie</h3><p id="txtAutarky">-</p></div>
        <div class="stat-card" style="border-color: var(--feedin)"><h3>JAZ</h3><p id="txtJaz">-</p></div>
        <div class="stat-card" style="border-color: var(--pv)"><h3>PV Ertrag</h3><p id="txtPvTotal">-</p></div>
        <div class="stat-card" style="border-color: var(--grid)"><h3>Netzbezug</h3><p id="txtGridTotal">-</p></div>
    </div>

    <div class="donut-row">
        <div class="chart-card"><h2>Energiequellen Haus</h2><div style="height:200px"><canvas id="donutSources"></canvas></div></div>
        <div class="chart-card"><h2>PV Nutzung</h2><div style="height:200px"><canvas id="donutUsage"></canvas></div></div>
    </div>

    <div class="chart-card">
        <h2>Energieflüsse pro Monat</h2>
        <div style="height:450px"><canvas id="chartMain"></canvas></div>
    </div>
</div>

<script>
    const DEFAULT_PREIS = 0.293, VERGUETUNG = 0.0795;
    let sunStore = {}, wpStore = {}, charts = {}, currentMode = 'All', selectedYear = '';

    async function loadData() {
        const files = ['solar.csv', 'wp.csv'];
        for (const file of files) {
            try {
                const res = await fetch(file + '?t=' + Date.now());
                if (res.ok) processData(await res.text(), file);
            } catch(e) { console.log("Ladefehler", file); }
        }
    }

    window.onload = () => {
        const sS = localStorage.getItem('sunStore'), sW = localStorage.getItem('wpStore');
        if(sS) sunStore = JSON.parse(sS); if(sW) wpStore = JSON.parse(sW);
        if(sS || sW) initDashboard();
        loadData();
    };

    function processData(text, name) {
        if (text.includes("PvToSite") || name.includes("solar")) {
            sunStore = parseSun(text); localStorage.setItem('sunStore', JSON.stringify(sunStore));
        } else {
            wpStore = parseWp(text); localStorage.setItem('wpStore', JSON.stringify(wpStore));
        }
        document.getElementById('statusLine').innerText = "Daten von GitHub geladen";
        initDashboard();
    }

    function cleanNum(val) { return parseFloat(val?.toString().replace(/\./g, '').replace(',', '.')) || 0; }

    function parseWp(csv) {
        const rows = Papa.parse(csv.trim(), {delimiter: ";", skipEmptyLines: true}).data;
        const res = {};
        rows.forEach(r => {
            if (r[0]?.toLowerCase() === "monat") {
                let k = r[1]; if(k.includes(".")) { const p = k.split("."); k = `${p[2]}-${p[1].padStart(2,'0')}`; }
                const e = cleanNum(r[12]) + cleanNum(r[17]), h = cleanNum(r[7]) + cleanNum(r[12]);
                if(e > 0 || h > 0) res[k] = { elec: e, heat: h };
            }
        });
        return res;
    }

    function parseSun(csv) {
        const rows = Papa.parse(csv, {header: true, skipEmptyLines: true}).data;
        const res = {};
        rows.forEach(r => {
            const t = (r.Time || r.time || "").substring(0, 7); if(!t) return;
            if(!res[t]) res[t] = { grid: 0, self: 0, feed: 0 };
            res[t].grid += parseFloat(r.GridToSite) || 0;
            res[t].self += (parseFloat(r.PvToSite) || 0) + (parseFloat(r.BatteryToSite) || 0);
            res[t].feed += (parseFloat(r.PvToGrid) || 0) + (parseFloat(r.BatteryToGrid) || 0);
        });
        return res;
    }

    function initDashboard() {
        const keys = Array.from(new Set([...Object.keys(sunStore), ...Object.keys(wpStore)]))
                          .filter(k => {
                              const s = sunStore[k], w = wpStore[k];
                              return (s && (s.self + s.feed > 0)) || (w && w.elec > 0);
                          }).sort();
        
        const years = Array.from(new Set(keys.map(k => k.split('-')[0]))).sort();
        const tb = document.getElementById('tabBar'); tb.innerHTML = '';
        const addBtn = (l, m, y='') => {
            const b = document.createElement('button'); b.innerText = l; b.className = 'tab-btn'+(currentMode===m && selectedYear===y?' active':'');
            b.onclick = () => { currentMode = m; selectedYear = y; initDashboard(); }; tb.appendChild(b);
        };
        addBtn('Gesamt', 'All'); years.forEach(y => addBtn(y, 'Year', y));
        render(keys);
    }

    function render(allKeys) {
        let keys = currentMode === 'Year' ? allKeys.filter(k => k.startsWith(selectedYear)) : allKeys;
        const data = keys.map(k => {
            const s = sunStore[k] || {grid:0, self:0, feed:0}, w = wpStore[k] || {elec:0, heat:0};
            return { k, ...s, ...w, pvGen: s.self + s.feed, housePure: Math.max(0, s.self - w.elec) };
        });

        const tG = data.reduce((a,b)=>a+b.grid,0), tS = data.reduce((a,b)=>a+b.self,0), tF = data.reduce((a,b)=>a+b.feed,0), tP = data.reduce((a,b)=>a+b.pvGen,0);
        document.getElementById('txtAutarky').innerText = (tG+tS > 0 ? (tS/(tG+tS)*100).toFixed(1) : "-") + "%";
        document.getElementById('txtPvTotal').innerText = tP.toFixed(0) + " kWh";
        document.getElementById('txtGridTotal').innerText = tG.toFixed(0) + " kWh";
        const wActive = data.filter(d => d.heat > 0);
        document.getElementById('txtJaz').innerText = wActive.length ? (wActive.reduce((a,b)=>a+b.heat,0)/wActive.reduce((a,b)=>a+b.elec,0)).toFixed(2) : "-";

        Object.values(charts).forEach(c => c?.destroy());
        const o = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } };

        charts.ds = new Chart(document.getElementById('donutSources'), { type:'doughnut', data:{labels:['PV','Netz'],datasets:[{data:[tS,tG],backgroundColor:['#2ecc71','#e74c3c']}]}, options:o });
        charts.du = new Chart(document.getElementById('donutUsage'), { type:'doughnut', data:{labels:['Eigen','Einspeisung'],datasets:[{data:[tS,tF],backgroundColor:['#2ecc71','#e67e22']}]}, options:o });

        charts.main = new Chart(document.getElementById('chartMain'), {
            type: 'bar',
            data: {
                labels: keys,
                datasets: [
                    { label: 'PV Erzeugung', data: data.map(d=>d.pvGen), backgroundColor: '#f1c40f', stack: 'B1' },
                    { label: 'Einspeisung', data: data.map(d=>d.feed), backgroundColor: '#e67e22', stack: 'B2' },
                    { label: 'Eigennutzung Haus', data: data.map(d=>d.housePure), backgroundColor: '#2ecc71', stack: 'B3' },
                    { label: 'Netzbezug', data: data.map(d=>d.grid), backgroundColor: '#e74c3c', stack: 'B3' },
                    { label: 'WP Strom', data: data.map(d=>d.elec), backgroundColor: '#9b59b6', stack: 'B4' }
                ]
            },
            options: { ...o, scales: { x: { stacked: false }, y: { stacked: true } } }
        });
    }
</script>
</body>
</html>
